# 前端容器 nginx 設定【根路徑版】。純內網、不綁 DNS、不要 route 時用這份
# （並讓 APP_ROUTE 留空 / VITE_BASE_PATH=/）。預設 Dockerfile.frontend 走 template 版；
# 要用這份請改 Dockerfile 的 COPY 行。說明見 frontend-backend-integration.md §3。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # 前端 SPA：找不到實體檔就回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 反代到後端容器：compose service 名稱是 backend，內埠 8000
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
